name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          OUTPUT="aicommit-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "\
            -X github.com/wungjyan/aicommit/cmd.version=${GITHUB_REF_NAME} \
            -X github.com/wungjyan/aicommit/cmd.commit=$(git rev-parse --short HEAD) \
            -X github.com/wungjyan/aicommit/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${OUTPUT}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aicommit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `aicommit-darwin-arm64` |
            | macOS | Intel | `aicommit-darwin-amd64` |
            | Linux | ARM64 | `aicommit-linux-arm64` |
            | Linux | x86_64 | `aicommit-linux-amd64` |
            | Windows | ARM64 | `aicommit-windows-arm64.exe` |
            | Windows | x86_64 | `aicommit-windows-amd64.exe` |

  npm:
    needs: release
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version to package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('npm/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('npm/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: cd npm && npm publish
